<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/enquiry.css">
    <title>Enquiry</title>
</head>

<body>
    <div class="container">
        
         <img src="assets/image/ApplicationHeader.png">
        <div class="header">
            <h2>Admission Enquiry</h2>
        </div>

        <form class="form-grid">

            <div class="form-group">
                <label>Admission For *</label>
                <select>
                    <option>--------Select--------</option>
                    <option>Pre KG</option>
                    <option>LKG</option>
                    <option>UKG</option>
                    <option>Ⅰ</option>
                    <option>Ⅱ</option>
                    <option>Ⅲ</option>
                    <option>Ⅳ</option>
                    <option>Ⅴ</option>
                    <option>Ⅵ</option>
                    <option>Ⅶ</option>
                    <option>Ⅷ</option>
                    <option>Ⅸ</option>
                    <option>Ⅹ</option>
                </select>
            </div>

            <div class="form-group">
                <label>Ward's / Student's Name *</label>
                <input type="text" placeholder="Enter Your Name">
            </div>

            <div class="form-group">
                <label>Father's/Mother's Name *</label>
                <input type="text" placeholder="Enter Your Father's/Mother's Name">
            </div>

            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" placeholder="Enter Your Mobile Number">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter Your Email (@a.x)">
            </div>

            <div class="form-group">
                <label>Referred By</label>
                <input type="text" placeholder="Enter Your Referral Name">
            </div>

            <div class="form-group full-width">
                <label>Address</label>
                <textarea placeholder="Enter Your Address"></textarea>
            </div>

            <div class="form-group full-width">
                <label>Message</label>
                <textarea placeholder="Enter Your Message"></textarea>
            </div>

            <div class="full-width">
                <button type="submit">Submit</button>
            </div>

        </form>
    </div>
</body>

</html>
